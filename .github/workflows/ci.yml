name: Nexus CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run lint
        run: npx eslint 
  
      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: file:./Nexus.db
